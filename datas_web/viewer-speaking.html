<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="kt-api-base" content="">
    <title>KoreanTalk | 말하기 전자책 뷰어</title>
    <link rel="stylesheet" href="css/security-viewer.css?v=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="result.js"></script>
</head>
<body data-viewer-mode="speaking">
    <div class="viewer-shell">
        <header class="viewer-topbar">
            <div class="viewer-heading">
                <div class="viewer-brand"><span class="viewer-brand-dot"></span>KoreanTalk Secure Viewer</div>
                <h1 id="viewerTitle">말하기 전자책 뷰어</h1>
                <p id="viewerSubtitle" class="viewer-subtitle">구매한 회원 전용으로 발급된 세션만 허용됩니다.</p>
            </div>
            <div class="viewer-topbar-actions">
                <span id="viewerModeChip" class="viewer-chip">말하기 훈련</span>
                <span id="viewerSecurityChip" class="viewer-chip">권한 확인 대기</span>
                <button id="closeViewerBtn" type="button" class="viewer-action-btn">상세로 돌아가기</button>
            </div>
        </header>

        <section class="viewer-meta-grid">
            <article class="viewer-meta-card"><div class="viewer-meta-label">세션 만료</div><div id="viewerExpiresText" class="viewer-meta-value subtle">확인 중</div></article>
            <article class="viewer-meta-card"><div class="viewer-meta-label">현재 페이지</div><div id="viewerPageText" class="viewer-meta-value">-</div></article>
            <article class="viewer-meta-card"><div class="viewer-meta-label">저자</div><div id="viewerAuthorText" class="viewer-meta-value subtle">KoreanTalk</div></article>
            <article class="viewer-meta-card"><div class="viewer-meta-label">보안 정책</div><div id="secureHint" class="viewer-meta-value subtle">원본 PDF URL을 직접 전달하지 않습니다.</div></article>
        </section>

        <main class="viewer-layout">
            <section class="viewer-stage">
                <div class="stage-toolbar">
                    <div class="stage-toolbar-left">
                        <span id="stageTag" class="stage-tag">말하기 훈련</span>
                        <span id="stageStatus" class="stage-status">준비시간과 말하기 시간을 기준으로 학습을 진행합니다.</span>
                    </div>
                    <div class="stage-toolbar-right control-row">
                        <button id="controlPrev" type="button" class="control-btn ghost">이전</button>
                        <button id="controlNext" type="button" class="control-btn ghost">다음</button>
                        <button id="controlZoomOut" type="button" class="control-btn ghost">축소</button>
                        <button id="controlZoomIn" type="button" class="control-btn ghost">확대</button>
                        <button id="controlFit" type="button" class="control-btn">너비 맞춤</button>
                        <button id="controlFullscreen" type="button" class="control-btn">전체화면</button>
                    </div>
                </div>
                <div id="canvasFrame" class="canvas-frame">
                    <div id="canvasEmpty" class="canvas-empty"><strong>보안 세션을 확인한 뒤 전자책을 로드합니다.</strong><span>구매 권한이 확인되면 PDF 본문이 표시됩니다.</span></div>
                    <canvas id="pdfCanvas"></canvas>
                    <div id="canvasOverlay" class="canvas-overlay"><div class="overlay-card"><div class="spinner"></div><h2 id="overlayTitle">세션을 확인하고 있습니다</h2><p id="overlayMessage">잠시만 기다려 주세요.</p></div></div>
                </div>
            </section>
            <aside id="sidebar" class="viewer-sidebar">
                <section id="sidebarSummary" class="sidebar-section"></section>
                <section class="sidebar-section progress-panel">
                    <div class="progress-copy"><strong id="progressLabel">학습 진행</strong><span id="progressValue">대기 중</span></div>
                    <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
                </section>
                <div class="control-row">
                    <button id="primaryActionBtn" type="button" class="panel-btn">말하기 시작</button>
                    <button id="secondaryActionBtn" type="button" class="panel-btn secondary">음성 중지</button>
                </div>
                <div id="sidebarBody"></div>
            </aside>
        </main>
    </div>
    <div id="viewerToast" class="toast"></div>
    <script src="js/security-viewer-app.js"></script>
</body>
</html>
