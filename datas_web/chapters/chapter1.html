        <div class="container">
            <h1>KoreanTalk</h1>

        </div>
    </header>

    <main class="container">
        <div class="chapter-detail">
            <a href="../index.html" class="back-link">← 챕터 목록으로 돌아가기</a>

            <div class="chapter-header">
                <h2>Chapter 1</h2>
                <p class="subtitle">병원에서의 대화</p>
            </div>

            <div class="image-section">
                <img src="../images/hospital.jpg" alt="병원 이미지" class="chapter-image">
            </div>

            <div class="dialogue-section">
                <h3>대화 내용</h3>
                <div class="dialogue-content" id="dialogueText">
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">간호사:</span> 안녕하세요. 어디가 불편하세요?
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">환자:</span> 어제부터 열이 나고 목이 아파요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">간호사:</span> 그러시군요. 먼저 체온을 재겠습니다.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">환자:</span> 네, 알겠습니다.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">간호사:</span> 체온이 38도네요. 의사 선생님께서 진료하실 겁니다.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">환자:</span> 감사합니다.
                        </div>
                    </div>
                </div>
            </div>

            <div class="tts-controls">
                <button id="ttsButton" class="tts-button" onclick="speakText()">🔊 전체 듣기</button>
            </div>
        </div>
    </main>
