                <h2>Chapter 3</h2>

            </div>

            <div class="image-section">
                <img src="../images/school.jpg" alt="학교 이미지" class="chapter-image">

            <div class="dialogue-section">
                <h3>대화 내용</h3>
                <div class="dialogue-content" id="dialogueText">
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">학생:</span> 선생님, 질문이 있어요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">선생님:</span> 네, 무엇이 궁금한가요?
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">학생:</span> 이 문제를 어떻게 풀어야 할지 모르겠어요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">선생님:</span> 어디 봅시다. 먼저 이 부분을 생각해 보세요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">학생:</span> 아, 이제 이해했어요. 감사합니다!
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">선생님:</span> 천만에요. 더 궁금한 것이 있으면 언제든지 물어보세요.
                        </div>
                    </div>
                </div>
            </div>

            <div class="tts-controls">
                <button id="ttsButton" class="tts-button" onclick="speakText()">🔊 전체 듣기</button>
