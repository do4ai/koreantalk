    <main class="container">
        <div class="chapter-detail">
            <a href="../index.html" class="back-link">← 챕터 목록으로 돌아가기</a>

            <div class="chapter-header">
                <h2>Chapter 2</h2>
                <p class="subtitle">식당에서의 대화</p>
            </div>

            <div class="image-section">
                <img src="../images/restaurant.jpg" alt="식당 이미지" class="chapter-image">
            </div>

            <div class="dialogue-section">
                <h3>대화 내용</h3>
                <div class="dialogue-content" id="dialogueText">
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">손님:</span> 여기 주문할게요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">직원:</span> 네, 말씀하세요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">손님:</span> 김치찌개 하나하고 된장찌개 하나 주세요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">직원:</span> 밥은 어떻게 하시겠어요?
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">손님:</span> 둘 다 공기밥으로 주세요.
                        </div>
                    </div>
                    <div class="dialogue-line">
                        <div class="dialogue-text">
                            <span class="speaker">직원:</span> 네, 알겠습니다. 잠시만 기다려 주세요.
                        </div>
                    </div>
                </div>
            </div>

            <div class="tts-controls">
                <button id="ttsButton" class="tts-button" onclick="speakText()">🔊 전체 듣기</button>
            </div>
        </div>
