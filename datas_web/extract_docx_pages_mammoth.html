<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOCX 페이지 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
    <h1>DOCX 페이지 구조 분석</h1>
    <input type="file" id="docxFile" accept=".docx" />
    <button onclick="analyzeDocx()">분석하기</button>
    <pre id="output" style="background: #f5f5f5; padding: 20px; max-height: 600px; overflow-y: auto;"></pre>

    <script>
        async function analyzeDocx() {
            const file = document.getElementById('docxFile').files[0];
            if (!file) {
                alert('DOCX 파일을 선택하세요');
                return;
            }

            const output = document.getElementById('output');
            output.textContent = '분석 중...\n\n';

            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
            const html = result.value;

            output.textContent += `HTML 길이: ${html.length}자\n\n`;

            // HTML 파싱
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // <hr> 태그 (페이지 구분선) 찾기
            const hrs = doc.querySelectorAll('hr');
            output.textContent += `<hr> 태그 (페이지 구분선): ${hrs.length}개\n\n`;

            // <br> 태그 찾기
            const brs = doc.querySelectorAll('br');
            output.textContent += `<br> 태그: ${brs.length}개\n\n`;

            // 모든 요소 타입 카운트
            const allElements = doc.body.children;
            const tagCounts = {};
            for (let elem of allElements) {
                tagCounts[elem.tagName] = (tagCounts[elem.tagName] || 0) + 1;
            }

            output.textContent += '태그 분포:\n';
            for (let [tag, count] of Object.entries(tagCounts)) {
                output.textContent += `  ${tag}: ${count}개\n`;
            }

            output.textContent += '\n' + '='.repeat(60) + '\n';
            output.textContent += 'HR 태그로 페이지 분할 시뮬레이션\n';
            output.textContent += '='.repeat(60) + '\n\n';

            if (hrs.length > 0) {
                // HR 태그로 페이지 분할
                const pages = {};
                let currentPage = 1;
                let currentText = '';

                for (let elem of allElements) {
                    if (elem.tagName === 'HR') {
                        if (currentText.trim()) {
                            pages[currentPage] = currentText.trim();
                            if (currentPage <= 5) {
                                output.textContent += `페이지 ${currentPage}: ${currentText.length}자\n`;
                                output.textContent += `  내용: ${currentText.substring(0, 100)}...\n\n`;
                            }
                            currentPage++;
                            currentText = '';
                        }
                    } else {
                        currentText += elem.textContent + ' ';
                    }
                }

                // 마지막 페이지
                if (currentText.trim()) {
                    pages[currentPage] = currentText.trim();
                    output.textContent += `페이지 ${currentPage}: ${currentText.length}자 (마지막)\n`;
                }

                output.textContent += `\n총 ${Object.keys(pages).length}개 페이지로 분할됨\n`;

                // JSON으로 저장 (첫 5페이지만)
                const first5Pages = {};
                for (let i = 1; i <= Math.min(5, Object.keys(pages).length); i++) {
                    first5Pages[i] = pages[i];
                }

                output.textContent += '\n\n첫 5페이지 JSON:\n';
                output.textContent += JSON.stringify(first5Pages, null, 2);

            } else {
                output.textContent += '페이지 구분선(hr)이 없습니다.\n';
            }
        }
    </script>
</body>
</html>
